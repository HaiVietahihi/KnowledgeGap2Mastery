{% extends "base.html" %}
{% block title %}Đăng nhập — KG2M{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">KG2M</div>
        <h2>Đăng nhập hệ thống</h2>

        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="Nhập email của bạn" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="password" placeholder="Nhập mật khẩu" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-full">Đăng nhập</button>
        </form>

        <div class="auth-hint">
            <div style="text-align: center; margin-bottom: 20px;">
                Chưa có tài khoản? <a href="{{ url_for('auth.register') }}">Đăng ký ngay</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
