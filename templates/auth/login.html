{% extends "base.html" %}
{% block title %}Đăng nhập — KG2M{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">📚</div>
        <h2>Đăng nhập KG2M</h2>

        <form method="POST">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="admin@kg2m.local" required>
            </div>
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="text" id="password" name="password" placeholder="admin123" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg btn-full">Đăng nhập</button>
        </form>

        <div class="auth-hint">
            <div style="text-align: center; margin-bottom: 20px;">
                Chưa có tài khoản? <a href="{{ url_for('auth.register') }}">Đăng ký ngay</a>
            </div>
            <div class="info-box" style="margin-top: 16px;">
                <strong>Tài khoản demo:</strong><br>
                👤 Giảng viên: <code>admin@kg2m.local</code> / <code>admin123</code><br>
                🎓 Sinh viên: <code>student@kg2m.local</code> / <code>student123</code>
            </div>
        </div>
    </div>
</div>
{% endblock %}
