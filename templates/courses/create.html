{% extends "base.html" %}
{% block title %}KG2M — Tạo Khóa Học Mới{% endblock %}

{% block content %}
<div class="breadcrumb">
    <a href="{{ url_for('index') }}">Trang chủ</a> / Tạo khóa học
</div>

<div class="page-header">
    <h1>Tạo Khóa Học Mới</h1>
</div>

<div class="card" style="max-width: 600px; margin: 0 auto;">
    <div class="card-header">
        <h3>Thông tin khóa học</h3>
    </div>
    <div class="card-body">
        <form method="POST">
            <div class="form-group">
                <label for="name">Tên khóa học <span class="required">*</span></label>
                <input type="text" id="name" name="name" class="form-control" required
                    placeholder="Ví dụ: Lập trình Web Khóa 2">
            </div>
            <div class="form-group">
                <label for="code">Mã khóa học <span class="required">*</span></label>
                <input type="text" id="code" name="code" class="form-control" required placeholder="Ví dụ: CS202">
            </div>
            <div class="form-group">
                <label for="description">Mô tả khái quát</label>
                <textarea id="description" name="description" class="form-control" rows="4"
                    placeholder="Nhập một số thông tin giới thiệu về khóa học..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Tạo khóa học</button>
        </form>
    </div>
</div>
{% endblock %}
